<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenEnv Pro - Advanced Expense Agent</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Auth Overlay -->
    <div id="auth-overlay" class="auth-overlay" role="dialog" aria-modal="true" aria-labelledby="auth-title">
        <div class="auth-card">
            <h2 id="auth-title">Welcome to OpenEnv</h2>
            <p id="auth-msg">Please Login or Signup to continue</p>

            <label for="username">Username</label>
            <input
                type="text"
                id="username"
                name="username"
                placeholder="Username"
                autocomplete="username"
            >

            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Password"
                autocomplete="current-password"
            >

            <div class="auth-buttons">
                <button onclick="handleAuth('login')" class="btn-auth">Login</button>
                <button onclick="handleAuth('signup')" class="btn-auth signup-btn">Signup</button>
            </div>
        </div>
    </div>

    <div class="app-container">
        <!-- Dashboard Header -->
        <header>
            <div class="title-section">
                <h1>OpenEnv Expense</h1>
                <p>AI Environment - Day <span id="current-day">1</span>/30</p>
            </div>
            <div class="header-actions">
                <button class="btn-top" onclick="showHistory()">📜 History</button>
                <button class="btn-top" onclick="showLeaderboard()">🏆 Leaders</button>
                <button class="btn-top btn-logout" onclick="logout()">🔒 Logout</button>
            </div>
            <div class="ai-suggestion-badge" id="ai-suggestion">AI: Welcome! Take an action to begin.</div>
            <div class="status-badge" id="status-badge">Environment: Ready</div>
        </header>

        <!-- Main Stats -->
        <div class="stats-grid">
            <div class="stat-card balance-card">
                <p class="stat-label">Current Balance</p>
                <h2 class="stat-value" id="balance">$5,000</h2>
                <div class="balance-trend">Initial State</div>
            </div>
            <div class="stat-card reward-card">
                <p class="stat-label">Last Reward</p>
                <h2 class="stat-value" id="reward">0.0</h2>
                <div class="total-reward">Total: <span id="total-reward">0.0</span></div>
            </div>
        </div>

        <!-- Real-Time Chart -->
        <div class="chart-container">
            <canvas id="balanceChart" role="img" aria-label="Balance over time chart"></canvas>
        </div>

        <!-- Action Controls -->
        <main class="controls">
            <div class="controls-header">
                <h2>Take Action</h2>
                <div class="auto-toggle">
                    <span id="voice-btn" onclick="startVoice()" role="button" aria-label="Start voice control" tabindex="0">🎙️</span>
                    <label for="auto-play-toggle">Auto-Play</label>
                    <input type="checkbox" id="auto-play-toggle" name="auto-play" onchange="toggleAutoPlay()">
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn btn-spend" onclick="takeAction(0)" id="btn-spend" aria-label="Food: spend on essentials">
                    <span class="icon" aria-hidden="true">🍱</span>
                    <span>Food</span>
                </button>
                <button class="btn btn-save" onclick="takeAction(1)" id="btn-save" aria-label="Save money">
                    <span class="icon" aria-hidden="true">🏦</span>
                    <span>Save</span>
                </button>
                <button class="btn btn-skip" onclick="takeAction(2)" id="btn-skip" aria-label="Skip this day">
                    <span class="icon" aria-hidden="true">⏳</span>
                    <span>Skip</span>
                </button>
                <button class="btn btn-luxury" onclick="takeAction(3)" id="btn-luxury" aria-label="Luxury spend">
                    <span class="icon" aria-hidden="true">🏎️</span>
                    <span>Luxury</span>
                </button>
            </div>
        </main>

        <!-- Footer / Reset -->
        <footer>
            <button class="btn-reset" onclick="resetEnv()">Reset Environment</button>
        </footer>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="auth-overlay" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="auth-card modal-content">
            <h2 id="modal-title">Title</h2>
            <div id="modal-body" class="modal-body"></div>
            <button onclick="closeModal()" class="btn-auth">Close</button>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notifications" aria-live="polite"></div>

    <script src="index.js"></script>
</body>
</html>
